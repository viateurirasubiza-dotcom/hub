<!DOCTYPE html>
<html lang="en">
<head>

    <title>Register - ScholarHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo"><h2>ScholarHub</h2></div>
    </nav>
</header>

<section>
    <h2>Register</h2>

    <form>

    </form>
</section>

<footer>

</footer>

<script src="js/main.js"></script>
